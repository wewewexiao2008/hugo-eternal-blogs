{{ if not (.Params.hideComments | default false) }}
<div class="comments-section">
  <div class="post-reactions">
    <h3 class="reactions-title">💬 Comments & Reactions</h3>
    <p class="reactions-hint">Sign in with GitHub to leave a comment or react. Supports <strong>Markdown</strong> formatting and reply threading.</p>
  </div>

  <div class="giscus"></div>
  <script
    src="https://giscus.app/client.js"
    data-repo="wewewexiao2008/hugo-eternal-blogs"
    data-repo-id="R_kgDOQsTRxw"
    data-category="Announcements"
    data-category-id="DIC_kwDOQsTRx84C-8bW"
    data-mapping="pathname"
    data-strict="0"
    data-reactions-enabled="1"
    data-emit-metadata="0"
    data-input-position="top"
    data-theme="preferred_color_scheme"
    data-lang="{{ if eq .Language.LanguageCode `zh-cn` }}zh-cn{{ else }}en{{ end }}"
    data-loading="lazy"
    crossorigin="anonymous"
    async
  ></script>
</div>
{{ end }}
